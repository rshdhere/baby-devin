# In-cluster KVM execution pool (self-managed clusters with /dev/kvm workers — not EKS).
#
# Apply order:
#   kubectl apply -f deploy/kubernetes/namespaces.yaml
#   kubectl apply -f deploy/kubernetes/crd/
#   kubectl label node <kvm-node> devin.baby/firecracker-host=true
#   kubectl apply -k deploy/kubernetes/in-cluster/ --load-restrictor LoadRestrictionsNone
#
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../namespaces.yaml
  - ../crd/sandboxes.devin.baby.yaml
  - ../crd/firecrackermachines.devin.baby.yaml
  - ../crd/firecrackerhosts.devin.baby.yaml
  - ../crd/snapshots.devin.baby.yaml
  - ../orchestrator/rbac.yaml
  - ../orchestrator/deployment.yaml
  - ../firecracker/node-pool.yaml
  - ../firecracker/daemonset.yaml
  - ../scheduler/daemonset.yaml

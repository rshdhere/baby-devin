apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: firecrackermachines.devin.baby
spec:
  group: devin.baby
  scope: Namespaced
  names:
    plural: firecrackermachines
    singular: firecrackermachine
    kind: FirecrackerMachine
    shortNames:
      - fcm
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Host
          type: string
          jsonPath: .status.host
        - name: VM
          type: string
          jsonPath: .status.vmId
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [sandboxName, runtime, cpu, memory]
              properties:
                sandboxName:
                  type: string
                taskId:
                  type: string
                runtime:
                  type: string
                cpu:
                  type: integer
                  minimum: 1
                memory:
                  type: string
                preferredHost:
                  type: string
                  description: Pin VM provisioning to a FirecrackerHost name or node name.
                host:
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                vmId:
                  type: string
                host:
                  type: string
                runtimeURL:
                  type: string
                message:
                  type: string

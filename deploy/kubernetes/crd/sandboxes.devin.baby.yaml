apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sandboxes.devin.baby
spec:
  group: devin.baby
  scope: Namespaced
  names:
    plural: sandboxes
    singular: sandbox
    kind: Sandbox
    shortNames:
      - sbx
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Runtime
          type: string
          jsonPath: .spec.runtime
        - name: Host
          type: string
          jsonPath: .status.host
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [runtime, cpu, memory]
              properties:
                taskId:
                  type: string
                runtime:
                  type: string
                cpu:
                  type: integer
                  minimum: 1
                memory:
                  type: string
                preferredHost:
                  type: string
                  description: Pin sandbox provisioning to a FirecrackerHost name or node name.
                image:
                  type: string
                  description: Deprecated; use runtime to select a snapshot-backed image.
            status:
              type: object
              properties:
                phase:
                  type: string
                vmId:
                  type: string
                host:
                  type: string
                runtimeURL:
                  type: string
                machineName:
                  type: string
                message:
                  type: string

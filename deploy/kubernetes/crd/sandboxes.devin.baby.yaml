apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sandboxes.devin.baby
spec:
  group: devin.baby
  scope: Namespaced
  names:
    plural: sandboxes
    singular: sandbox
    kind: Sandbox
    shortNames:
      - sbx
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Image
          type: string
          jsonPath: .spec.image
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [cpu, memory, image]
              properties:
                taskId:
                  type: string
                cpu:
                  type: integer
                  minimum: 1
                memory:
                  type: string
                image:
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                podName:
                  type: string
                pvcName:
                  type: string
                message:
                  type: string

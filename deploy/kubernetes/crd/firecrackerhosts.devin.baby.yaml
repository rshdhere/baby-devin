apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: firecrackerhosts.devin.baby
spec:
  group: devin.baby
  scope: Namespaced
  names:
    plural: firecrackerhosts
    singular: firecrackerhost
    kind: FirecrackerHost
    shortNames:
      - fch
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Address
          type: string
          jsonPath: .spec.address
        - name: ReadyVMs
          type: integer
          jsonPath: .status.readyVMs
        - name: UsedCPU
          type: integer
          jsonPath: .status.usedCPU
        - name: Node
          type: string
          jsonPath: .spec.nodeName
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [address, capacity]
              properties:
                address:
                  type: string
                  description: HTTP base URL of the firecracker-host daemon on this node.
                capacity:
                  type: object
                  required: [cpu, memory]
                  properties:
                    cpu:
                      type: integer
                      minimum: 1
                    memory:
                      type: string
                nodeName:
                  type: string
                  description: Kubernetes node name when firecracker-host runs in-cluster.
                schedulerAddress:
                  type: string
                  description: HTTP base URL of the co-located scheduler on this host.
            status:
              type: object
              properties:
                usedCPU:
                  type: integer
                usedMemory:
                  type: string
                readyVMs:
                  type: integer
                message:
                  type: string

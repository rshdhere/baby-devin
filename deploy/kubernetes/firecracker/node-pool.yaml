# Label and optionally taint KVM-capable worker nodes for the in-cluster execution pool.
#
# Inspired by kata-deploy's node labeling (katacontainers.io/kata-runtime=true), devin.baby
# uses a dedicated worker pool instead of running Firecracker on every cluster node.
#
# Prerequisites on each worker:
#   - /dev/kvm present (hardware virtualization)
#   - /var/lib/devin snapshots built (see deployment.md)
#
# Label one or more nodes:
#
#   kubectl label node <node-name> devin.baby/firecracker-host=true
#
# Optional: prevent non-execution workloads from scheduling on these nodes:
#
#   kubectl taint nodes <node-name> devin.baby/firecracker-host=true:NoSchedule
#
# When ORCHESTRATOR_NODE_REGISTER_ENABLED=true (default), the orchestrator watches labeled
# nodes and creates a FirecrackerHost CR per node with:
#   spec.address            = http://<node-internal-ip>:9092
#   spec.schedulerAddress     = http://<node-internal-ip>:9091
#   spec.nodeName             = <node-name>
#
# Verify registration:
#
#   kubectl -n devin-firecracker get firecrackerhosts -o wide
#
apiVersion: v1
kind: ConfigMap
metadata:
  name: devin-node-pool
  namespace: devin-firecracker
  labels:
    app.kubernetes.io/name: devin-node-pool
data:
  node-label: devin.baby/firecracker-host
  node-label-value: "true"
  optional-taint-key: devin.baby/firecracker-host
  optional-taint-value: "true"
  optional-taint-effect: NoSchedule

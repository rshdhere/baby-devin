# Sample FirecrackerHost for dry-run / manual registration.
# In-cluster KVM pools auto-register via the orchestrator node pool controller when nodes
# are labeled devin.baby/firecracker-host=true. For production in-cluster hosts, prefer
# auto-registration over this manifest.
apiVersion: devin.baby/v1
kind: FirecrackerHost
metadata:
  name: fc-local
  namespace: devin-firecracker
spec:
  address: http://devin-firecracker-host.devin-firecracker.svc.cluster.local:9092
  nodeName: fc-local
  capacity:
    cpu: 32
    memory: 64Gi
status:
  usedCPU: 0
  usedMemory: 0Gi
  readyVMs: 8
  message: sample host for dry-run clusters

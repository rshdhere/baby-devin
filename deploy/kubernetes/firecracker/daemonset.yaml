apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: devin-firecracker-host
  namespace: devin-firecracker
  labels:
    app: devin-firecracker-host
spec:
  selector:
    matchLabels:
      app: devin-firecracker-host
  template:
    metadata:
      labels:
        app: devin-firecracker-host
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: firecracker-host
          image: devin-firecracker-host:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9092
              name: http
              hostPort: 9092
          env:
            - name: FIRECRACKER_HOST_PORT
              value: "9092"
            - name: FIRECRACKER_HOST_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: FIRECRACKER_DRY_RUN
              value: "false"
            - name: FIRECRACKER_POOL_SIZE
              value: "8"
            - name: FIRECRACKER_DEFAULT_RUNTIME
              value: nextjs
            - name: FIRECRACKER_RUNTIME_PORT
              value: "8080"
            - name: FIRECRACKER_KERNEL_PATH
              value: /var/lib/devin/linux/vmlinux
            - name: FIRECRACKER_SNAPSHOT_DIR
              value: /var/lib/devin/snapshots
            - name: FIRECRACKER_VMM_DIR
              value: /var/lib/devin/vms
            - name: FIRECRACKER_CNI_NETWORK
              value: fcnet
            - name: FIRECRACKER_CNI_CONF_DIR
              value: /etc/cni/conf.d
            - name: FIRECRACKER_CNI_BIN_PATH
              value: /opt/cni/bin
            - name: FIRECRACKER_CAPACITY_CPU
              value: "32"
            - name: FIRECRACKER_CAPACITY_MEMORY
              value: 64Gi
          securityContext:
            privileged: true
          volumeMounts:
            - name: devin-lib
              mountPath: /var/lib/devin
            - name: devin-cni
              mountPath: /etc/cni/conf.d
              readOnly: true
      volumes:
        - name: devin-lib
          hostPath:
            path: /var/lib/devin
            type: DirectoryOrCreate
        - name: devin-cni
          configMap:
            name: devin-firecracker-cni
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: devin-firecracker-cni
  namespace: devin-firecracker
data:
  fcnet.conflist: |
    {
      "cniVersion": "0.4.0",
      "name": "fcnet",
      "plugins": [
        {
          "type": "ptp",
          "ipMasq": true,
          "ipam": {
            "type": "host-local",
            "subnet": "192.168.127.0/24",
            "resolvConf": "/etc/resolv.conf"
          }
        },
        {
          "type": "tc-redirect-tap"
        }
      ]
    }
---
apiVersion: v1
kind: Service
metadata:
  name: devin-firecracker-host
  namespace: devin-firecracker
  labels:
    app: devin-firecracker-host
spec:
  clusterIP: None
  selector:
    app: devin-firecracker-host
  ports:
    - name: http
      port: 9092
      targetPort: http

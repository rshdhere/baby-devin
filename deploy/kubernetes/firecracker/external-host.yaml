# Register dedicated execution Droplets (outside the cluster) with the orchestrator.
# Apply one FirecrackerHost per Droplet. Replace addresses and capacity with real values.
#
#   kubectl apply -f deploy/kubernetes/firecracker/external-host.yaml
#
apiVersion: devin.baby/v1
kind: FirecrackerHost
metadata:
  name: fc-prod-01
  namespace: devin-firecracker
spec:
  address: http://10.116.0.12:9092
  capacity:
    cpu: 8
    memory: 16Gi
---
apiVersion: devin.baby/v1
kind: FirecrackerHost
metadata:
  name: fc-prod-02
  namespace: devin-firecracker
spec:
  address: http://10.116.0.13:9092
  capacity:
    cpu: 8
    memory: 16Gi

apiVersion: apps/v1
kind: Deployment
metadata:
  name: devin-orchestrator
  namespace: devin-system
  labels:
    app: devin-orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devin-orchestrator
  template:
    metadata:
      labels:
        app: devin-orchestrator
    spec:
      serviceAccountName: devin-orchestrator
      containers:
        - name: orchestrator
          image: devin-orchestrator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
              name: http
          env:
            - name: ORCHESTRATOR_PORT
              value: "9090"
            - name: ORCHESTRATOR_DRY_RUN
              value: "false"
            - name: ORCHESTRATOR_CONTROLLER_ENABLED
              value: "true"
            - name: SANDBOX_NAMESPACE
              value: devin-sandboxes
            - name: FIRECRACKER_NAMESPACE
              value: devin-firecracker
            - name: APP_NAMESPACE
              value: devin-app
            - name: SANDBOX_DEFAULT_RUNTIME
              value: nextjs
            - name: ORCHESTRATOR_NODE_REGISTER_ENABLED
              value: "true"
            - name: FIRECRACKER_NODE_LABEL
              value: devin.baby/firecracker-host
            - name: FIRECRACKER_HOST_PORT
              value: "9092"
            - name: SCHEDULER_PORT
              value: "9091"
            - name: FIRECRACKER_DEFAULT_HOST_CPU
              value: "8"
            - name: FIRECRACKER_DEFAULT_HOST_MEMORY
              value: 16Gi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: devin-orchestrator
  namespace: devin-system
  labels:
    app: devin-orchestrator
spec:
  selector:
    app: devin-orchestrator
  ports:
    - name: http
      port: 9090
      targetPort: http

apiVersion: v1
kind: ServiceAccount
metadata:
  name: devin-orchestrator
  namespace: devin-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: devin-orchestrator
rules:
  - apiGroups: ["devin.baby"]
    resources:
      - sandboxes
      - sandboxes/status
      - firecrackermachines
      - firecrackermachines/status
      - firecrackerhosts
      - firecrackerhosts/status
      - snapshots
      - snapshots/status
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devin-orchestrator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: devin-orchestrator
subjects:
  - kind: ServiceAccount
    name: devin-orchestrator
    namespace: devin-system

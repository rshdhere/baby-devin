# External execution hosts (recommended for AWS EKS / managed cloud).
#
# Apply order:
#   kubectl apply -k deploy/kubernetes/external/ --load-restrictor LoadRestrictionsNone
#   kubectl apply -f deploy/kubernetes/firecracker/external-host.yaml
#   Run firecracker-host + scheduler on each EC2 host (see deployment.md)
#
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../namespaces.yaml
  - ../crd/sandboxes.devin.baby.yaml
  - ../crd/firecrackermachines.devin.baby.yaml
  - ../crd/firecrackerhosts.devin.baby.yaml
  - ../crd/snapshots.devin.baby.yaml
  - ../orchestrator/rbac.yaml
  - ../orchestrator/deployment.yaml

patches:
  - path: orchestrator-env.yaml

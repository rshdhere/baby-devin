# Co-located scheduler for in-cluster KVM worker nodes.
# Runs with hostNetwork so it can reach microVM runtime URLs (192.168.127.x) on the same host.
#
# Set SCHEDULER_HOST_NAME to the Kubernetes node name (must match FIRECRACKER_HOST_NAME on
# the co-located firecracker-host pod). The scheduler passes this as spec.preferredHost when
# creating sandboxes so VMs are provisioned on the local host.
#
# For a single execution node, point server SCHEDULER_URL at spec.schedulerAddress on the
# registered FirecrackerHost CR. Multi-node routing requires sticky routing or one node per
# scheduler URL — see deployment.md.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: devin-scheduler
  namespace: devin-firecracker
  labels:
    app: devin-scheduler
spec:
  selector:
    matchLabels:
      app: devin-scheduler
  template:
    metadata:
      labels:
        app: devin-scheduler
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        devin.baby/firecracker-host: "true"
      tolerations:
        - key: devin.baby/firecracker-host
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: scheduler
          image: devin-scheduler:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9091
              name: http
              hostPort: 9091
          env:
            - name: SCHEDULER_PORT
              value: "9091"
            - name: ORCHESTRATOR_URL
              value: http://devin-orchestrator.devin-system.svc:9090
            - name: SCHEDULER_HOST_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: DEFAULT_AGENT
              value: mock
---
apiVersion: v1
kind: Service
metadata:
  name: devin-scheduler
  namespace: devin-firecracker
  labels:
    app: devin-scheduler
spec:
  clusterIP: None
  selector:
    app: devin-scheduler
  ports:
    - name: http
      port: 9091
      targetPort: http

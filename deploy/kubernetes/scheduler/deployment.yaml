apiVersion: apps/v1
kind: Deployment
metadata:
  name: devin-scheduler
  namespace: devin-system
  labels:
    app: devin-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devin-scheduler
  template:
    metadata:
      labels:
        app: devin-scheduler
    spec:
      containers:
        - name: scheduler
          image: devin-scheduler:latest
          ports:
            - containerPort: 9091
              name: http
          env:
            - name: SCHEDULER_PORT
              value: "9091"
            - name: ORCHESTRATOR_URL
              value: http://devin-orchestrator.devin-system.svc:9090
            - name: RUNTIME_URL
              value: http://devin-runtime.devin-sandboxes.svc:8080
---
apiVersion: v1
kind: Service
metadata:
  name: devin-scheduler
  namespace: devin-system
spec:
  selector:
    app: devin-scheduler
  ports:
    - name: http
      port: 9091
      targetPort: http
